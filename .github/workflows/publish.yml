on:
  push:
    branches: [main]
  workflow_dispatch:

name: Render and Publish

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::tidyverse
            any::psych
            any::haven
            any::readr
            any::fastDummies
            any::lubridate
            any::tableone
            any::flextable
            any::officer
            any::rempsyc
            any::naniar
            any::lavaan
            any::jtools
            any::metafor
            any::robumeta
            any::clubSandwich
            any::scales
            any::readxl
            any::QuantPsyc
            any::apaTables
            any::corrplot

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _book
          branch: gh-pages